.hero-title h1 span {

.underline {

/* تنظيم الكاردات */
.projects-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 30px;
    width: 100%;
    max-width: 1200px;
}

.project-card {
    background: rgba(26, 5, 29, 0.8); /* خلفية غامقة وشفافة شوية */
    border: 1px solid rgba(209, 18, 209, 0.3);
    border-radius: 20px;
    padding: 40px;
    width: 350px;
    text-align: center;
    backdrop-filter: blur(10px);
    transition: all 0.4s ease;
}

/* تأثير الـ Hover */
.project-card:hover {
    transform: translateY(-15px);
    border-color: #d112d1;
    box-shadow: 0 0 30px rgba(209, 18, 209, 0.3);
    background: rgba(26, 5, 29, 0.95);
}

.card-icon img {
    width: 80px;
    height: 80px;
    background-color: #fff;
    border-radius: 50%;
    mix-blend-mode: lighten;
    border: 2px solid #d112d1;
    box-shadow: 0 0 15px rgba(209, 18, 209, 0.6);
    object-fit: contain;
    padding: 5px;
}

.project-card h3 {
    color: white;
    font-size: 1.5rem;
    margin-bottom: 15px;
}

.project-card p {
    color: #ccc;
    font-size: 0.9rem;
    margin-bottom: 30px;
}

/* الأزرار */
.card-buttons {
    display: flex;
    gap: 15px;
    margin-bottom: 5px;
}

.btn-main {
    flex: 1;
    background: #d112d1;
    color: white;
    padding: 10px;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
    font-size: 0.85rem;
}

.btn-sub {

    border: 1px solid #d112d1;
    color: #d112d1;
    padding: 10px;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
    font-size: 0.85rem;
}

.btn-main:hover {
    box-shadow: 0 0 15px #d112d1;
}
